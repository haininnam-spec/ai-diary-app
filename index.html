<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="나만의 AI 감정 일기장">
    <title>AI 감정 일기</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts: Nanum Pen Script & Gowun Dodum -->
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 로그인 화면 -->
    <main class="container" id="login-container">
        <h1>AI 감정 일기</h1>
        <p class="login-subtitle">오늘의 감정을 기록하고 위로를 받아보세요</p>
        
        <div class="auth-form">
            <input type="email" id="email-input" placeholder="이메일 주소" required>
            <input type="password" id="password-input" placeholder="비밀번호" required>
            
            <div class="button-group auth-buttons">
                <button class="btn btn-primary" id="btn-login">로그인</button>
                <button class="btn btn-secondary" id="btn-signup">회원가입</button>
            </div>
            
            <div class="divider">
                <span>또는</span>
            </div>
            
            <button class="btn btn-google" id="btn-google-login">
                <span class="icon">G</span> Google로 로그인
            </button>
        </div>
    </main>

    <!-- 메인 일기장 화면 (기본 숨김) -->
    <main class="container" id="app-container" style="display: none;">
        <div class="header-row">
            <h1>오늘의 하루는 어땠나요?</h1>
            <div class="user-info">
                <span id="user-email-display" style="color: #7a916b; margin-right: 10px; font-weight: bold;"></span>
                <button class="btn-text" id="btn-logout">로그아웃</button>
            </div>
        </div>
        
        <label for="diary-input" class="sr-only">일기 입력</label>
        <textarea id="diary-input" placeholder="오늘 있었던 일이나 느꼈던 감정을 자유롭게 적어주세요..."></textarea>
        
        <div class="button-group">
            <button class="btn btn-voice" id="btn-voice">
                <span class="icon">🎙️</span> 음성으로 입력
            </button>
            <button class="btn btn-analyze" id="btn-analyze">
                <span class="icon">✨</span> 분석 요청하기
            </button>
        </div>

        <section class="ai-response-section">
            <h2>AI의 답변</h2>
            <div class="ai-box" id="ai-response-box">
                여기에 AI 의 답변이 표시됩니다.
            </div>
        </section>

        <section class="history-section" id="history-section">
            <h2>나의 일기 히스토리</h2>
            <div class="history-container" id="history-container">
                <p style="text-align:center; color:#888;">히스토리를 불러오는 중입니다...</p>
            </div>
        </section>
    </main>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
